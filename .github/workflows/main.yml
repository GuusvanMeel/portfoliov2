name: CI

on:
  push:
    branches: ["master", "Development"]
  pull_request:
    branches: ["master", "Development"]

jobs:
  build:
    name: Lint, typecheck and build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: print a summary
        run: echo "Dit is een summmary" >> $GITHUB_STEP_SUMMARY
    
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: build

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      LHCI_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      LHCI_ADMIN_PASSWORD: ${{ secrets.LHCI_ADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci

      - name: Add Lighthouse summary
        if: always()
        run: npm run lighthouse:summary

      - name: Upload Lighthouse manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-manifest
          path: lhci-reports/manifest.json
          if-no-files-found: ignore
