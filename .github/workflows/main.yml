name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Lint, typecheck and build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck
      
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run component tests
        run: npm run test:components
      
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build project
        run: npm run build

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [build, cypress]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v7
        with:
          name: coverage-report
          path: coverage

      - name: Run SonarQube scan
        id: sonar_scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Add SonarQube summary on failure
        if: always() && steps.sonar_scan.outcome == 'failure'
        run: |
          echo "## SonarQube Quality Gate failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SonarCloud heeft de Quality Gate niet gehaald." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Open SonarCloud dashboard](https://sonarcloud.io/dashboard?id=GuusvanMeel_portfoliov2&branch=master)" >> $GITHUB_STEP_SUMMARY

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Development'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Run Lighthouse CI
        id: lighthouse_ci
        run: npm run lighthouse:ci

      - name: Add Lighthouse summary
        id: lighthouse_summary
        if: always()
        run: npm run lighthouse:summary

      - name: Upload Lighthouse reports
        if: always() && steps.lighthouse_summary.outputs.needs_report == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: lhci-selected-reports
          retention-days: 7
          if-no-files-found: ignore

  cypress:
    name: End-to-End
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Development'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      CYPRESS_TEST_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      CYPRESS_TEST_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CYPRESS_COVERAGE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js coverage build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-coverage-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-coverage-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js app with coverage
        run: npm run build

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: http://localhost:3000

      - name: Generate coverage report
        if: always()
        run: npx nyc report --reporter=lcov --reporter=text-summary

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: error

      - name: Add Cypress summary
        if: always()
        run: |
          echo "## Cypress End-to-End Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested flows:" >> $GITHUB_STEP_SUMMARY
          echo "- Login" >> $GITHUB_STEP_SUMMARY
          echo "- Create project" >> $GITHUB_STEP_SUMMARY
          echo "- Edit project" >> $GITHUB_STEP_SUMMARY
          echo "- Toggle visibility" >> $GITHUB_STEP_SUMMARY
          echo "- Delete project" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f cypress/results/metrics.md ]; then
            cat cypress/results/metrics.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore