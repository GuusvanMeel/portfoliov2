name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Lint, typecheck and build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        id: lint
        run: npm run lint

      - name: Run typecheck
        id: typecheck
        run: npm run typecheck

      - name: Build project
        id: build_project
        run: npm run build

      - name: Add build summary
        if: always()
        run: |
          echo "## Build summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Typecheck | ${{ steps.typecheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build_project.outcome }} |" >> $GITHUB_STEP_SUMMARY

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SonarQube scan
        id: sonar_scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Add SonarQube summary
        if: always()
        run: |
          echo "## SonarQube summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SonarQube scan | ${{ steps.sonar_scan.outcome }} |" >> $GITHUB_STEP_SUMMARY

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Development'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      LHCI_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      LHCI_ADMIN_PASSWORD: ${{ secrets.LHCI_ADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        id: lighthouse_ci
        run: npm run lighthouse:ci

      - name: Add Lighthouse summary
        id: lighthouse_summary
        if: always()
        run: npm run lighthouse:summary

      - name: Upload Lighthouse reports
        if: always() && steps.lighthouse_summary.outputs.needs_report == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: lhci-reports
          retention-days: 7
          if-no-files-found: ignore